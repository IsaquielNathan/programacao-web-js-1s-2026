<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Agendamento</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container">

        <div class="row">
            <div class="col-12 text-center mt-3">
                <h1>Agendamento</h1>
            </div>
        </div>
        <form action="/agendamento" method="post">
            <div class="row mt-3">
                <div class="col-12">
                    <h3>Dados do paciente</h3>
                </div>
                <div class="col-6 mt-1">
                    <label for="nome" class="form-label">Nome:</label>
                    <input type="text" name="nome" id="nome" class="form-control" >
                </div>
                <div class="col-6 mt-1">
                    <label for="sobrenome" class="form-label">Sobrenome:</label>
                    <input type="text" name="sobrenome" id="sobrenome" class="form-control" >
                </div>
                <div class="col-6 mt-1">
                    <label for="cpf" class="form-label">CPF:</label>
                    <input type="number" name="cpf" id="cpf" class="form-control" >
                </div>
                <div class="col-6 mt-1">
                    <label for="data_nascimento" class="form-label">Data de nascimento:</label>
                    <input type="date" name="data_nascimento" id="data_nascimento" class="form-control" >
                </div>
                <div class="col-12 mt-1">
                    <label for="endereco" class="form-label">Endereço:</label>
                    <input type="text" name="endereco" id="endereco" class="form-control" >
                </div>
            </div>
            <form action="">
                <div class="row mt-3">
                    <div class="col-12">
                        <h3>Dados da consulta</h3>
                    </div>
                    <div class="col-6 mt-1">
                        <label for="clinica" class="form-label">Clínica:</label>
                        <input type="text" name="clinica" id="clinica" class="form-control" >
                    </div>
                    <div class="col-6 mt-1">
                        <label for="especialidade" class="form-label">Especialidade:</label>
                        <input type="text" name="especialidade" id="especialidade" class="form-control" >
                    </div>
                    <div class="col-6 mt-1">
                        <label for="data" class="form-label">Data</label>
                        <input type="date" name="data" id="data" class="form-control" >
                    </div>
                    <div class="col-6 mt-1">
                        <label for="hora" class="form-label">Hora</label>
                        <input type="time" class="form-control" id="hora" name="hora" >
                    </div>
                    <div class="col-12 mt-1">
                        <label for="observacao" class="form-label">Observação</label>
                        <input type="text" class="form-control" id="observacao" name="observacao">
                    </div>

                </div>
                <div class="row mt-3">
                    <div class="col-12"></div>
                    <button type="submit" class="btn btn-primary w-100">Enviar</button>
                </div>
            </form>

    </div>

</body>

</html>
